<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sell Product - Campus Market</title>

<link rel="stylesheet" href="css/style.css">

</head>
<body>

<nav>
    <div class="logo">🎓 Campus Market</div>

    <ul>
        <li><a href="index.html">Home</a></li>
        <li><a href="products.php">Products</a></li>
        <li><a href="sell.html">Sell</a></li>
        <li><a href="login.html">Login</a></li>
    </ul>
</nav>

<div class="form-container">

    <h2>Sell Your Product</h2>

    <form
        action="../backend/add-product.php"
        method="POST"
        enctype="multipart/form-data">

        <input
            type="text"
            name="title"
            placeholder="Product Name"
            required>

        <input
            type="number"
            step="0.01"
            name="price"
            placeholder="Price"
            required>

        <textarea
            name="description"
            placeholder="Product Description"
            rows="5"></textarea>

        <select name="category" required>
            <option value="">Select Category</option>
            <option value="Books">Books</option>
            <option value="Electronics">Electronics</option>
            <option value="Notes">Notes</option>
            <option value="Accessories">Accessories</option>
            <option value="Others">Others</option>
        </select>

        <br><br>

        <select name="status" required>
            <option value="Available">Available</option>
            <option value="Sold">Sold</option>
        </select>

        <br><br>

        <label><b>Main File</b></label>

        <input
            type="file"
            name="file"
            required>

        <br><br>

        <label><b>Preview Image (Thumbnail)</b></label>

        <input
            type="file"
            name="preview_image"
            accept="image/*"
            required>

        <br><br>

        <button
            type="submit"
            name="add_product">
            Upload Product
        </button>

    </form>

</div>

<footer>
    <p>© 2026 Campus Market | Developed by Abhishek Kumar Singh</p>
</footer>

</body>
</html>
